<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mall Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Mall Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <nav class="navbar mall-nav px-4">
        <!-- Brand -->
        <a href="/home" class="mall-brand text-decoration-none">
            <i class="bi bi-activity me-1"></i> Fitness Freaks Mall
        </a>


        <!-- Menu -->
        <div class="d-flex gap-3 ms-4">
            <!-- <a href="/dashboard" class="mall-link">
                <i class="bi bi-grid me-1"></i> Dashboard
            </a> -->
            <a href="/inventory" class="mall-link">
                <i class="bi bi-box-seam me-1"></i> Inventory
            </a>

            <a href="/sales" class="mall-link">
                <i class="bi bi-bar-chart-line me-1"></i> Sales
            </a>

            <a href="/simulation" class="mall-link">
                <i class="bi bi-cpu me-1"></i> Simulation
            </a>

        </div>

        <!-- Right Side -->
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white fw-semibold">
                <i class="bi bi-person-circle me-1"></i> {{ user }}
            </span>

            <a href="/logout" class="btn btn-outline-danger btn-sm">
                <i class="bi bi-box-arrow-right"></i>
            </a>
        </div>
    </nav>

</body>

</html>
