<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mall Navbar</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Mall Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>
    <nav class="navbar mall-nav px-3">

        <!-- LEFT: BRAND + TOGGLE -->
        <div class="d-flex align-items-center gap-2">

            <!-- MOBILE TOGGLE -->
            <!-- <button class="nav-toggle d-md-none" onclick="toggleMenu()">
                <i class="bi bi-list"></i>
            </button> -->

            <!-- BRAND -->
            <a href="/home" class="mall-brand text-decoration-none">
                <i class="bi bi-activity me-1"></i> Fitness Freaks Mall
            </a>
        </div>

        <!-- CENTER MENU -->
        <div class="nav-menu mx-auto d-flex align-items-center" id="navMenu">
            <a href="/inventory" class="mall-link">
                <i class="bi bi-box-seam me-1"></i> Inventory
            </a>

            <a href="/sales" class="mall-link">
                <i class="bi bi-bar-chart-line me-1"></i> Sales
            </a>

            <a href="/simulation" class="mall-link">
                <i class="bi bi-cpu me-1"></i> Simulation
            </a>
        </div>

        <!-- RIGHT USER -->
        <div class="nav-right">
            <span class="text-white fw-semibold">
                <i class="bi bi-person-circle me-1"></i> {{ user }}
            </span>

            <a href="/logout" class="btn btn-outline-danger btn-sm">
                Logout
            </a>
        </div>

    </nav>

    <!-- TOGGLE SCRIPT -->
    <!-- <script>
        function toggleMenu() {
            document.getElementById("navMenu").classList.toggle("show-menu");
        }
    </script> -->
</body>

</html>
