<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Mall Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="light-page">

    {% include "navbar.html" %}

    <div class="mall-container">

        <h3 class="page-title">
            <i class="bi bi-building"></i> Brand Dashboard
        </h3>

        <!-- BRAND GRID -->
        <div class="brand-grid-2col">
            {% set brands = ["NIKE","PUMA","REEBOK","LIFELONG","LOTTO","ADIDAS","JASPO","NIVIA","CAMPUS","REDTAPE"] %}

            {% for b in brands %}
            <div class="brand-card {% if selected_brand==b %}selected{% endif %}"
                onclick="location.href='/select-brand/{{ b }}'">
                {{ b }}
            </div>
            {% endfor %}
        </div>

        <!-- BOTTOM BUTTONS -->
        <div class="d-flex justify-content-between mt-4">
            <a href="/home" class="btn btn-outline-secondary px-4">
                ← Back
            </a>

            {% if selected_brand %}
            <a href="/inventory" class="btn btn-success px-4">
                Next →
            </a>
            {% else %}
            <button class="btn btn-success px-4" disabled>
                Select Brand →
            </button>
            {% endif %}
        </div>

    </div>

</body>

</html>
