<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mall Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body class="d-flex justify-content-center align-items-center" style="height:100vh;">

    <form method="POST" class="p-4 rounded login-box" style="width:320px;">
        <h4 class="text-center mb-4">
            <i class="bi bi-shop me-2"></i>Fitness Freaks Mall
        </h4>

        <div class="mb-3">
            <label>Username</label>
            <div class="input-group">
                <span class="input-group-text bg-dark text-success">
                    <i class="bi bi-person"></i>
                </span>
                <input type="text" name="username" class="form-control bg-dark text-light" required>
            </div>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <div class="input-group">
                <span class="input-group-text bg-dark text-success">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password" name="password" class="form-control bg-dark text-light" required>
            </div>
        </div>

        <button class="btn btn-success w-100">
            <i class="bi bi-box-arrow-in-right"></i> Login
        </button>
    </form>

</body>

</html>
